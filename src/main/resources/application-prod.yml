server:
  port: 8081

spring:
  application:
    name: unplug-user-service
  datasource:
    url: jdbc:mysql://mysql-service:3306/user_db
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  server:
    base-path: /user/actuator   # actuator 기본 경로 변경
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 86400000 # 1 day
  refresh-token-expiration-ms: 172800000 # 2 days